LEC_power_struggle_lu_xun_decision_category:0 "Struggle For the Commune"
LEC_power_struggle_lu_xun_decision_category_desc:0 "After the loss of our dear comrade Lu Xun, the commune is now divided between 4 factions. The §VMayakovskyite faction§! is led by Qu Quibai, who seeks to further develop Lu Xun's ideas in combination with the ideas of Mayakovsky, the russian social-futurist. Qubai was an original CBP member who now advocates for liberation of the urban avante guard urban proletariat. Next is the §RCreation Society faction§!, in which is a faction developed from a previous organization absorbed by the League, called the Creation Society, despite being absorbed, the leaders Guo Moruo & Yu Dafu continued to have the society as a subranch/faction of the League. The two leaders promot a more technocratic socialist approach, with Yu Dafu being described as more of a Vperedist and Moruo more of a socialist technocrat. The 3rd faction is the §tAgrarian Revolutionary faction§!, which was formed by Zhang Chunqiao and Kang Sheng who were young shanghai revolutionaries who would go on to read archived reports  from the now disbanded CBP about the works of Mao Zedong, leader of the Xinmin society in Hunan. The faction tries to expand China's socialist revolution by gain support and supporting the peasant majority, and also changing old reactionary culture in favor of new proletarian culture. Finally the final faction is the §MStudent faction§!, a faction formed by what is known in the communal council as the Gang of 3. The first leader is Ruo Shi, who is a loyal follower of Lu Xun ideas and focuses on expanding Lu Xun's idea's to China. Next is Zhou Yang who has opposition to Lu Xun's ideas and rather focus' on ideas that serve as partial inspiration to the §tAgrarian faction§! but also having a major avante guard influence yet also a focus on urbanization.Finally there is Ding Ling, who is a socialist feminist, whose party practice on nation equality and using some ideas from Yu Dafu, but also having mixed ideas from Lu Xun and some of his opponents in the League.\n\nFaction Influence:\n§VMayakovskyite Faction:  [?quibai_faction]§!\n§RCreation Society:  [?creation_faction]§!\n§tAgrarian Faction:  [?agrarian_faction]§!\n§MStudent Union Faction:  [?student_faction]§!\n"
LEC_increase_the_mayakovskyite_faction:0 "Increase §VMayakovskyite§! Influence"
LEC_increase_the_creationists_faction:0 "Increase §RCreation Society§! Influence"
LEC_increase_the_radical_agrarians_faction:0 "Increase §tAgrarianist§! Influence"
LEC_increase_the_student_union_faction:0 "Increase §MStudent§! Influence"

LEC_spread_revolution_decision_category:0 "Spreading the Revolution"
LEC_spread_revolution_decision_category_desc:0 "The nation hears a thunder rolling through the sky,\nthe drums of war beat with pride,\nPeasants rise with their heads up high.\nDon't look back because its our time...\n\nWe shall connect with  peasants and workers all across China and unite under the revolutionary banner first held by our founder Lu Xun to liberate the masses from feudalism, capitalism and imperialism. We shall crush our enemies with a fist mightier than the sword! As our blood stains the banners of our nation. We shall never forget our comrades lost, past-present-and future.\n\nNote: In order to gain max amount of uprising units,  you must do the prepare decision 5 times in which correlate to 3 stages of army unit size. First level is 2 divisions, 2nd is 4 and 3rd is 6. This will be the case for all uprisings you do for Nanjing, Southern Qing, West China, South China and Fengtian."
