##Deciscions###
### Factions ###
BRM_the_chettyar_crisis_decision_category:0 "The State Council"
BRM_the_chettyar_crisis_decision_category_desc:0 "The collapse of the British regime brought the battered royalists back into power under a fragile coalition, but it could not solve the economic inequities left behind by colonial rule. The Chettyars, Indian landholders who have only become more powerful with the absence of British restrictions, are driving rural inequity and rage to a breaking point. Failure to handle this will leave lasting consequences as factionalism grows within Burma.\nFactions:\n\nThe §XTraditionalists§! are seeking to consolidate and centralise power around the throne. Their political control bestows political power. However, their power only comes from balancing the power of all factions with their own undeniable superiority.\n\nThe §YInternational Traders§! seek to further the economy of Burma, and will gain more trade deal efficiency the more power they have. However, the more they gain, the more they will reduce public support and military factories.\n\nThe §BUCBA Nationalist Movement§! seeks to control the political  apparatus and guide it towards their aims of conservative, modernising nationalism. It will provide increasing production bonuses for civilian factories. They may ally with the Traditionalists but are likely to lean more towards educational reform and expanded rights and economic roles for native Burmans.\n\nThe §RThakin-Radical Movement§!  has built on its educational base to expand towards labour rights, education expansion and rural mobilisation. This movement will contribute recruitable population, and mild political power buffs.\n\nThe §FMilitary§! starts with Negligible power, but unlocking increasing power to the political army will grant it more influence in politics. They grant powerful bonuses to the military's offensive and defensive power.\n§FMilitary: [?burma_army|%0]§!"
Burma_traditionalists_gui_title:0 "§XTraditionalists§!"
Burma_traditionalists_gui_ammount:0 "§X[?burma_trad|%0]§!"
