### Parties ###
BRM_totalist_party:0 "Dobama Asiayone"
BRM_totalist_party_long:0 "Dobama Asiayone - Letyon Tat(We Burmans Association - Letyon Tat)\n§gIn the 1930’s anti-Indian riots broke out, which led to the creation of the We Burmans Association, as a Bamar nationalist organization. Formed from partly traditionalist to new radical leftist students, the We Burmans Association was formed as a response to the increasing capitulationism of the GBCA’s rule towards foreign companies, fearing that Burma might once again become a colony. Though a nationalist organization, the association’s main political guides have come from radical leftist students who had been taught by British socialists in their years studying abroad. With the resulting riots and some of the founding members being apart of the government of the GBCA at the time, the We Burmans Association would get some level of political representation as the more traditionalist members would give the organization said political representation.\n Formed as a needed defence against local reactionary police and hired security, the Letyon Tat is the main paramilitary organisation of the We Burmans Association, with many of its members and leadership coming from young leftist students and some military recruits who would also join the We Burmans Association.§!"
BRM_radical_socialist_party:0 "Dobama Asiayone"
BRM_radical_socialist_party_long:0 "Dobama Asiayone- Phebiyan Ahthin(We Burmans Association - Burmese Fabian Society)\n§gIn the 1930’s anti-Indian riots broke out, which led to the creation of the We Burmans Association, as a Bamar nationalist organization. Formed from partly traditionalist to new radical leftist students, the We Burmans Association was formed as a response to the increasing capitulationism of the GBCA’s rule towards foreign companies, fearing that Burma might once again become a colony. Though a nationalist organization, the association’s main political guides have come from radical leftist students who had been taught by British socialists in their years studying abroad. With the resulting riots and some of the founding members being apart of the government of the GBCA at the time, the We Burmans Association would get some level of political representation as the more traditionalist members would give the organization said political representation.\nThe Nagani Bookclubs were a resultant study group organization that helped spread socialist literature, especially when it would be later allowed to enter the country. The Nagani bookclub would view perspectives from either a more traditional buddhist aspect with embraces of a buddhist socialist state or lean to more hardline Marxist viewpoints.§!"
BRM_syndicalist_party:0 "Dobama Asiayone"
BRM_syndicalist_party_long:0 "Dobama Asiayone - Nagani(We Burmans Association - Nagani Book Club/Farmers Association)\n§gIn the 1930’s anti-Indian riots broke out, which led to the creation of the We Burmans Association, as a Bamar nationalist organization. Formed from partly traditionalist to new radical leftist students, the We Burmans Association was formed as a response to the increasing capitulationism of the GBCA’s rule towards foreign companies, fearing that Burma might once again become a colony. Though a nationalist organization, the association’s main political guides have come from radical leftist students who had been taught by British socialists in their years studying abroad. With the resulting riots and some of the founding members being apart of the government of the GBCA at the time, the We Burmans Association would get some level of political representation as the more traditionalist members would give the organization said political representation.\nThakin Ba Cho, would be one of the many students that had joined the initial 1920 student strike, and would be inspired to study new political theories whilst studying abroad in the UK. In this environment he would also encounter these leftwing study groups, with ideas of guild socialism and syndicalism being taught to him. Coming back from Britain, in 1923, he would consistently advocate for independence, and would continue even after the British withdrew. This would result in Ba Cho forming and supporting workers unions against major foreign companies who were exploiting the land and the workers. In the midst of this he would have his own study group led by more Fabian ideas.§!"
BRM_social_democrat_party:0 "Dobama Asiayone"
BRM_social_democrat_party_long:0 "Dobama Asiayone - Sinyetha(We Burmans Association - Poor Man's Association)\n§gIn the 1930’s anti-Indian riots broke out, which led to the creation of the We Burmans Association, as a Bamar nationalist organization. Formed from partly traditionalist to new radical leftist students, the We Burmans Association was formed as a response to the increasing capitulationism of the GBCA’s rule towards foreign companies, fearing that Burma might once again become a colony. Though a nationalist organization, the association’s main political guides have come from radical leftist students who had been taught by British socialists in their years studying abroad. With the resulting riots and some of the founding members being apart of the government of the GBCA at the time, the We Burmans Association would get some level of political representation as the more traditionalist members would give the organization said political representation.\nFormed initially to contest local elections as a means to trying to improve the livelihood of the peasants, Ba Maw’s Poor Man’s Party would later merge with the We Burmans Association, citing share goals in terms of policy and ideology. Ba Maw himself would be one of the students receiving some education for British leftist circles in his university years.§!"
BRM_social_liberal_party:0 "Myanma Ahthinchokgyi"
BRM_social_liberal_party_long:0 "Myanma Ahthinchokgyi - Sanghar Sarmagge (We Burmans Association - National Maha Sangha Samadhi Maggi Federation)\n§gFormed in the fires of the 1920 student strike against oppressive colonial rule of the British, the General Council of Burmese Association (Or GBCA for short) a general conglomerate of groups tied back to Young Men’s Buddhist Association to which all advocate for full Burmese sovereignty in one way or another. With the collapse of  British colonial rule the GBCA would find itself leading a fragile alliance amongst factions in itself and external groups to govern the country after independence. Though this independence its seemingly questioned as the party has been called out for giving concessions to the Germans for better economic benefits.\nNational Maha Sangha Samadhi Maggi Federation was formed by a group of progressive monks who weren’t yet fully tied to the traditionalist branches of the GBCA. Strong anti-imperialist the National Maha Sangha Samadhi Maggi Federation demands full economic independence for the Burmese people, along with encouragement of a fair society to be practised in accordance with their Buddhist views.§!"
BRM_market_liberal_party:0 "Konthye Ahthin"
BRM_market_liberal_party_long:0 "Kon-thye Myanmar-naing-ngan Ah-thin  - Burmese Merchants Association\n§gFormed in the fires of the 1920 student strike against oppressive colonial rule of the British, the General Council of Burmese Association (Or GBCA for short) a general conglomerate of groups tied back to Young Men’s Buddhist Association to which all advocate for full Burmese sovereignty in one way or another. With the collapse of  British colonial rule the GBCA would find itself leading a fragile alliance amongst factions in itself and external groups to govern the country after independence. Though this independence its seemingly questioned as the party has been called out for giving concessions to the Germans for better economic benefits.\nThe Burmese Merchants Association, was formed in 1919 by Burmese businessmen seeking to combat foreign monopolies taking a majority share in the country’s economy. This however would be somewhat lessened or not worried about as much due to the dire economic crisis faced by the newly independent Burma, prompting some members to support the economic concessions enacted by the GBCA.§!"
BRM_social_conservative_party:0 "Myanma Ahthinchokgyi"
BRM_social_conservative_party_long:0 "Myanma Ahthinchokgyi - 21 (General Council of Burmese Associations - 21 Faction)\n§gFormed in the fires of the 1920 student strike against oppressive colonial rule of the British, the General Council of Burmese Association (Or GBCA for short) a general conglomerate of groups tied back to Young Men’s Buddhist Association to which all advocate for full Burmese sovereignty in one way or another. With the collapse of  British colonial rule the GBCA would find itself leading a fragile alliance amongst factions in itself and external groups to govern the country after independence. Though this independence its seemingly questioned as the party has been called out for giving concessions to the Germans for better economic benefits.\nThe 21 Faction of the party is a party more so formed along the lines of traditionalist elements that supported the government structure stretching as far back as 1922, whilst more reformist elements such as the Hlaing faction would be more adamant of reforms to the GBCA and the government.§!"
BRM_authoritarian_democrat_party:0 "Myanma Ahthinchokgyi"
BRM_authoritarian_democrat_party_long:0 "Myanma Ahthinchokgyi - 21 (General Council of Burmese Associations - 21 Faction)\n§gFormed in the fires of the 1920 student strike against oppressive colonial rule of the British, the General Council of Burmese Association (Or GBCA for short) a general conglomerate of groups tied back to Young Men’s Buddhist Association to which all advocate for full Burmese sovereignty in one way or another. With the collapse of  British colonial rule the GBCA would find itself leading a fragile alliance amongst factions in itself and external groups to govern the country after independence. Though this independence its seemingly questioned as the party has been called out for giving concessions to the Germans for better economic benefits.\nThe 21 Faction of the party is a party more so formed along the lines of traditionalist elements that supported the government structure stretching as far back as 1922, whilst more reformist elements such as the Hlaing faction would be more adamant of reforms to the GBCA and the government.§!"
BRM_paternal_autocrat_party:0 "Myanma Ahthinchokgyi"
BRM_paternal_autocrat_party_long:0 "Myanma Ahthinchokgyi - 21 (General Council of Burmese Associations - 21 Faction)\n§gFormed in the fires of the 1920 student strike against oppressive colonial rule of the British, the General Council of Burmese Association (Or GBCA for short) a general conglomerate of groups tied back to Young Men’s Buddhist Association to which all advocate for full Burmese sovereignty in one way or another. With the collapse of  British colonial rule the GBCA would find itself leading a fragile alliance amongst factions in itself and external groups to govern the country after independence. Though this independence its seemingly questioned as the party has been called out for giving concessions to the Germans for better economic benefits.\nThe 21 Faction of the party is a party more so formed along the lines of traditionalist elements that supported the government structure stretching as far back as 1922, whilst more reformist elements such as the Hlaing faction would be more adamant of reforms to the GBCA and the government.§!"
BRM_national_populist_party:0 "Myanma Ahthinchokgyi"
BRM_national_populist_party_long:0 "Myanma Ahthinchokgyi - Myochit(General Council of Burmese Associations - Patriots Party)\n§gFormed in the fires of the 1920 student strike against oppressive colonial rule of the British, the General Council of Burmese Association (Or GBCA for short) a general conglomerate of groups tied back to Young Men’s Buddhist Association to which all advocate for full Burmese sovereignty in one way or another. With the collapse of  British colonial rule the GBCA would find itself leading a fragile alliance amongst factions in itself and external groups to govern the country after independence. Though this independence its seemingly questioned as the party has been called out for giving concessions to the Germans for better economic benefits.\nDeveloped in the rise of growing concessions towards foreign powers after independence, the U Saw’s Patriots Party pushes a heavyhanded Bamar nationalist line, seeking a unification of all Burmese lands under the Bamar people with heavy emphasis on embracing buddhist and folk traditions to which is seen as “uniquely Bamar”.§!"

