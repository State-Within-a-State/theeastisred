BRM_minority_integration_decision_category_desc:0 "Slowing building up from the era of British colonialism, the regions on our border are having a surge in new found nationalism to which multiple nationalities are vying for independence due to increased tensions between themselves the ruling Bamar populations.\nIf resistance is above 75% the chance of frontier nations declaring independence occurs:\n\nShan Resistance:§R[?shan_anger|%0]§!\nKachin Resistance:§R[?kachin_anger|%0]§!\nRakhine Resistance:§R[?rakhine_anger|%0]§!"



### Ideas ###
BRM_shan_resistance:0 "Shan State Resistance"
BRM_shan_resistance_desc:0 "Periodic flag marches are all that remains of the nominal authority of the Burmese state - repeated failures to pacify the Shan state could have severe consequences on the legitimacy of the country."
BRM_rangoon_export:0 "Rangoon Export Firms"
BRM_rangoon_export_desc:0 "Since the collapse of the British market and the Empire, Burma is forced to rely on credit lent from German banks. But these firms rely on often unstable international prices that have only become more so in the 1930s, and the failure of the Bullinger Pool's implicit support risks plunging Burma into total economic disarray."



BRM_young_officers:0 "Young Officer Corps"
BRM_young_officers_desc:0 "Due to the relative youth of our revived Kingdom and the devastation brought by the previously occupying Anglos we have been forced to promote an extremely youthful High Command that is learning on the job."
BRM_birds:0 "Birds of a Feather"
BRM_birds_desc:0 "Much like our National Peacock throughout our history we have flocked and flirted with Nations aligning to our goals and ambitions, unfortunately this is a two-way street and our populace is more willing to collaborate with Invaders."
