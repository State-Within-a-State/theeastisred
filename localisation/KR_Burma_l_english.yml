### Ideas ###
BRM_Chettyiar_Crisis:0 "The Chettiar Crisis"
BRM_Chettyiar_Crisis_desc:0 "The collapse of the British regime has brought the battered royalists back into power under a fragile coalition, but the legacy of economic issues and inequities remain unsolved as German Capital would try to fill the vacuum left by the British. The Chettyars are Indian landholders to which would own swaths of Burmese land and economic resources under British colonial rule, but now they have  become more powerful with the absence of British restrictions, driving rural inequity and rage to a breaking point. This itself tends to be done in partnership and tandem with the German Capital, where foreign exports are dominated by German credit and internal commodity production is dominated (As per the consequences of the 1922 deal with the rice firms that prop up Burma's economy). The rice firms consolidate more of the economy every year, and land dispossession is pushing the royal coffers into utter crisis. With these actors in play, the Burmese government attempts to keep the country in a some level of both political and economic stability, to which this is contradicted by the different factions that form this fragile coalition."
BRM_shan_resistance:0 "Shan State Resistance"
BRM_shan_resistance_desc:0 "Periodic flag marches are all that remains of the nominal authority of the Burmese state - repeated failures to pacify the Shan state could have severe consequences on the legitimacy of the country."
BRM_rangoon_export:0 "Rangoon Export Firms"
BRM_rangoon_export_desc:0 "Since the collapse of the British market and the Empire, Burma has been forced to rely on credit lent from German banks. But these firms rely on often unstable international prices that have only become more so prevalent since the start of the 1930s, and the failure of the Bullinger Pool's implicit support risks plunging Burma into total economic disarray."
