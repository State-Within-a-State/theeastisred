### Factions ###
BRM_the_chettyar_crisis_decision_category:0 "The State Council"
BRM_the_chettyar_crisis_decision_category_desc:0 "The collapse of the British regime brought the battered royalists back into power under a fragile coalition, but it could not solve the economic inequities left behind by colonial rule. The Chettyars, Indian landholders who have only become more powerful with the absence of British restrictions, are driving rural inequity and rage to a breaking point. Failure to handle this will leave lasting consequences as factionalism grows within Burma."
Burma_traditionalists_gui_title:0 "§XTraditionalists§!\nThe Tradtionalists are seeking to consolidate and centralise power around the throne. Their political control bestows political power. However, their power only comes from balancing the power of all factions with their own undeniable superiority. Since the gaining independence in the fall of the British empire, the traditionalists have maintained the main leadership over the government, but would be in a position where it has to share certain aspects of power as a means of stability and legitimacy along with balancing nations that have an interest in the country’s economy."
Burma_traditionalists_gui_ammount:0 "§X[?burma_trad|%0]§!"
Burma_international_traders_gui_title:0 "§YInternational Traders§!\nFormed as the Burmese Merchants Association, formerly the Burmese Chamber of Commerce, it is generally formed of Burmese businessmen but would gradually include some foreign businessmen, GBCA members and Chettyars, with each of these groups representing share but also different interests on handling the Burmese economy, with some proposing a more nationalistic take, whilst others are supporting further foreign economic intervention."
Burma_international_traders_gui_ammount:0 "§Y[?burma_int|%0]§!"
Burma_GBCA_nationalist_gui_title:0 "§BUCBA Nationalist Movement§!\nThe UCBA Nationalist Movement seeks to control the political  apparatus and guide it towards their aims of conservative, modernising nationalism. It is mainly composed of radical Bamar nationalists and progressive monks who prioritise a unified Burmese state free from control of foreign powers, with encouragement of traditionalists Buddhist beliefs and empowerment of the Burmese people in all aspects of Burmese society. Though at times, the UBCA Nationalists will align with certain factions of the traditionalists as a means of anti-socialist rhetoric, similar this is done with certain anti-socialist factions in the Thakin Societies."
Burma_GBCA_nationalis_gui_ammount:0 "§B[?burma_ubca|%0]§!"
Burma_thakin_radicals_gui_title:0 "§RThakin-Radical Movement§!\nA movement that has been built on its educational base to expand towards labour rights, education expansion and rural mobilisation. Formed by a mix of Bamar nationalists and radical leftist students, the Thakin-Radicals mainly push heavy anti-imperialist rhetoric and mostly anti-capitalist rhetoric, citing the continued economic subjugation under Germany after independence and the increasingly exploitative conditions for the Burmese workers and peasants."
Burma_thakin_radicals_gui_ammount:0 "§R[?burma_thak|%0]§!"
Burma_military_gui_ammount:0 "§F[?burma_army|%0]§!"
Burma_military_gui_title:0 "§FBurmese Military§!\nA relatively new force in Burmese politics, the Burmese army would be formed initially of conscripts and veterans from the British colonial days, where after the British revolution, would stay in Burma, serving as the new members of the country’s army. But the political power of the military is quite low with it often staying out of politics, but this would change after the formation of the We Burmans Association and the defeat to Siam in the late 1920’s. With some of the younger officers being more or less so aligned with the We Burmans Association, to which the current government has been trying to win over more conservative officers as a means of maintaining control of the army. But this has inevitably created a sense of growing political power from within the military to which if they get enough influence, can make their own decision regarding how the nation is governed in either of the factions."

